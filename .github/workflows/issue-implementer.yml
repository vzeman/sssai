name: Issue Implementer

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to implement'
        required: false
        type: string
      pr_number:
        description: 'PR number for review-fix mode'
        required: false
        type: string
      review_fix_cycle:
        description: 'Review-fix cycle number (1-3)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: issue-implementer-${{ github.event.issue.number || inputs.issue_number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  implement:
    name: Implement Issue
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # ================================================================
      # Step 1: Checkout
      # ================================================================
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ================================================================
      # Step 2: Setup Node.js + tsx
      # ================================================================
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22

      - name: Install tsx globally
        run: npm install -g tsx

      # ================================================================
      # Step 3: Fetch issue data (workflow_dispatch only)
      # ================================================================
      - name: Fetch issue data (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.issue_number != '' && inputs.pr_number == ''
        id: fetch-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ inputs.issue_number }}
        run: |
          ISSUE_JSON=$(gh issue view "$ISSUE_NUM" --json number,title,body,labels,author \
            | jq '{number, title, body, labels, user: {login: .author.login}}')
          {
            echo "json<<ISSUE_EOF"
            echo "$ISSUE_JSON"
            echo "ISSUE_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "✔ Fetched issue #${ISSUE_NUM}"

      # ================================================================
      # Step 4: Detect mode (issue vs review-fix)
      # ================================================================
      - name: Detect mode
        id: mode
        run: |
          if [[ -n "${{ inputs.pr_number }}" && -n "${{ inputs.review_fix_cycle }}" ]]; then
            echo "mode=review-fix" >> "$GITHUB_OUTPUT"
          else
            echo "mode=issue" >> "$GITHUB_OUTPUT"
          fi

      # ================================================================
      # Step 5: Guard check
      # ================================================================
      - name: Run guard
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_JSON: ${{ steps.fetch-issue.outputs.json || toJSON(github.event.issue) }}
          PR_NUMBER: ${{ inputs.pr_number || '' }}
          REVIEW_FIX_CYCLE: ${{ inputs.review_fix_cycle || '' }}
        run: |
          DECISION=$(tsx scripts/issue-implementer-guard.ts --evaluate)
          echo "Decision: $DECISION"

          SHOULD=$(echo "$DECISION" | jq -r '.shouldImplement')
          ISSUE_NUMBER=$(echo "$DECISION" | jq -r '.issueNumber')
          ISSUE_TITLE=$(echo "$DECISION" | jq -r '.issueTitle')
          BRANCH=$(echo "$DECISION" | jq -r '.branchName')
          REASON=$(echo "$DECISION" | jq -r '.reason')
          EXISTING_PR=$(echo "$DECISION" | jq -r '.existingPR // empty')

          echo "should-implement=${SHOULD}" >> "$GITHUB_OUTPUT"
          echo "issue-number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "issue-title=${ISSUE_TITLE}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          echo "existing-pr=${EXISTING_PR}" >> "$GITHUB_OUTPUT"

      - name: Post starting comment
        if: steps.guard.outputs.should-implement == 'true' && steps.mode.outputs.mode == 'issue'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          ISSUE_NUMBER: ${{ steps.guard.outputs.issue-number }}
          BRANCH: ${{ steps.guard.outputs.branch }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            const branch = process.env.BRANCH;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                `## 🤖 Implementation Agent — Starting`,
                '',
                `**Branch**: \`${branch}\``,
                `**Run**: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                'Implementation agent is working on this issue...',
              ].join('\n'),
            });

      - name: Skip — guard rejected
        if: steps.guard.outputs.should-implement != 'true'
        run: |
          echo "::notice::Guard rejected implementation: ${{ steps.guard.outputs.reason }}"

      # ================================================================
      # Step 6: Branch creation (issue mode)
      # ================================================================
      - name: Create branch (issue mode)
        if: steps.guard.outputs.should-implement == 'true' && steps.mode.outputs.mode == 'issue'
        env:
          BRANCH: ${{ steps.guard.outputs.branch }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          git fetch origin "${DEFAULT_BRANCH}"
          # Delete stale remote branch if it exists
          git push origin --delete "${BRANCH}" 2>/dev/null || true
          git checkout -b "${BRANCH}" "origin/${DEFAULT_BRANCH}"
          echo "✔ Created branch ${BRANCH} from origin/${DEFAULT_BRANCH}"

      - name: Checkout PR branch (review-fix mode)
        if: steps.guard.outputs.should-implement == 'true' && steps.mode.outputs.mode == 'review-fix'
        env:
          BRANCH: ${{ steps.guard.outputs.branch }}
        run: |
          git fetch origin "${BRANCH}"
          git checkout "${BRANCH}"
          echo "✔ Checked out existing PR branch ${BRANCH}"

      # ================================================================
      # Step 7: Baseline validation
      # ================================================================
      - name: Baseline validation
        if: steps.guard.outputs.should-implement == 'true'
        id: baseline
        run: |
          echo "=== Baseline: Lint ==="
          LINT_BASELINE="skip"
          echo "no linter configured"
          echo "lint=${LINT_BASELINE}" >> "$GITHUB_OUTPUT"

          echo "=== Baseline: Tests ==="
          TEST_BASELINE="skip"
          echo "no tests configured"
          echo "test=${TEST_BASELINE}" >> "$GITHUB_OUTPUT"

          echo "=== Baseline: Build ==="
          BUILD_BASELINE="skip"
          echo "no build configured"
          echo "build=${BUILD_BASELINE}" >> "$GITHUB_OUTPUT"

      # ================================================================
      # Step 8: Read implementer prompt
      # ================================================================
      - name: Read implementer prompt
        if: steps.guard.outputs.should-implement == 'true'
        id: prompt-file
        run: |
          if [[ -f ".codefactory/prompts/issue-implementer.md" ]]; then
            {
              echo "content<<PROMPT_EOF"
              cat .codefactory/prompts/issue-implementer.md
              echo "PROMPT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "content=Implement the feature or fix described in the issue." >> "$GITHUB_OUTPUT"
          fi

      # ================================================================
      # Step 9: Build implementation prompt
      # ================================================================
      - name: Build implementation prompt
        if: steps.guard.outputs.should-implement == 'true'
        id: build-prompt
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PROMPT_TEMPLATE: ${{ steps.prompt-file.outputs.content }}
          ISSUE_JSON: ${{ steps.fetch-issue.outputs.json || toJSON(github.event.issue) }}
          ISSUE_NUMBER: ${{ steps.guard.outputs.issue-number }}
          ISSUE_TITLE: ${{ steps.guard.outputs.issue-title }}
          BASELINE_LINT: ${{ steps.baseline.outputs.lint }}
          BASELINE_TEST: ${{ steps.baseline.outputs.test }}
          BASELINE_BUILD: ${{ steps.baseline.outputs.build }}
          MODE: ${{ steps.mode.outputs.mode }}
          PR_NUMBER: ${{ inputs.pr_number || '' }}
          REVIEW_FIX_CYCLE: ${{ inputs.review_fix_cycle || '' }}
        with:
          script: |
            const fs = require('fs');
            const template = process.env.PROMPT_TEMPLATE || '';
            const mode = process.env.MODE;

            let issue = {};
            try { issue = JSON.parse(process.env.ISSUE_JSON || '{}'); } catch {}

            const issueNumber = process.env.ISSUE_NUMBER;
            const issueTitle = process.env.ISSUE_TITLE;
            const issueBody = issue.body || '';
            const issueAuthor = (issue.user || {}).login || 'unknown';

            let conventions = '';
            try { conventions = fs.readFileSync('CLAUDE.md', 'utf-8').slice(0, 6000); } catch {}

            let config = '';
            try { config = fs.readFileSync('harness.config.json', 'utf-8'); } catch {}

            const sections = [template, ''];

            if (mode === 'review-fix') {
              const prNumber = process.env.PR_NUMBER;
              const cycle = process.env.REVIEW_FIX_CYCLE;
              sections.push(
                '## Review-Fix Mode',
                '',
                `**PR**: #${prNumber}`,
                `**Cycle**: ${cycle}/3`,
                '',
                'Fix ONLY the blocking issues identified in the latest review comment.',
                'Look for the most recent comment containing `<!-- review-verdict: REQUEST_CHANGES -->`.',
                'Address each blocking issue precisely. Do not make unrelated changes.',
                ''
              );
            }

            sections.push(
              '## Issue Context',
              '',
              `**Issue**: #${issueNumber} — ${issueTitle}`,
              `**Author**: ${issueAuthor}`,
              '',
              '### Issue Body',
              '',
              issueBody || '*(no body provided)*',
              '',
              '## Project Conventions (from CLAUDE.md)',
              '',
              conventions || 'No CLAUDE.md found.',
              '',
              '## Harness Configuration',
              '',
              '```json',
              config || '{}',
              '```',
              '',
              '## Baseline State',
              '',
              `- Lint: ${process.env.BASELINE_LINT}`,
              `- Tests: ${process.env.BASELINE_TEST}`,
              `- Build: ${process.env.BASELINE_BUILD}`,
              '',
              '## Constraints',
              '',
              '- Do NOT modify: `.github/workflows/*`, `harness.config.json`, `CLAUDE.md`, lock files',
              '- Do NOT run git commands (commit, push, checkout)',
              '- Do NOT call EnterPlanMode or ExitPlanMode',
              '- Execute changes directly using Read, Write, Edit, Glob, Grep, and Bash tools',
            );

            const prompt = sections.join('\n');
            core.setOutput('prompt', prompt);
            core.info(`Prompt built (${prompt.length} chars)`);

      # ================================================================
      # Step 10: Extract review feedback (review-fix mode only)
      # ================================================================
      - name: Extract review feedback
        if: steps.guard.outputs.should-implement == 'true' && steps.mode.outputs.mode == 'review-fix'
        id: review-feedback
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            // Find latest review with REQUEST_CHANGES verdict
            const reviewComments = comments.filter(c =>
              c.body?.includes('<!-- review-verdict: REQUEST_CHANGES -->')
            );
            const latest = reviewComments[reviewComments.length - 1];

            if (latest) {
              const feedback = latest.body.slice(0, 10000);
              core.setOutput('feedback', feedback);
              core.info(`Found review feedback (${feedback.length} chars)`);
            } else {
              core.setOutput('feedback', '');
              core.info('No REQUEST_CHANGES review found');
            }

      # ================================================================
      # Step 11: Agent execution
      # ================================================================
      - name: Run AI agent
        if: steps.guard.outputs.should-implement == 'true'
        id: agent
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 55
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ${{ steps.build-prompt.outputs.prompt }}

            ${{ steps.review-feedback.outputs.feedback != '' && format('## Latest Review Feedback\n\n{0}', steps.review-feedback.outputs.feedback) || '' }}
          claude_args: '--max-turns 100 --allowedTools "Edit,Write,Read,Glob,Grep,Bash"'
          allowed_bots: 'github-actions'

      # ================================================================
      # Step 12: Check for file changes
      # ================================================================
      - name: Check for file changes
        if: steps.guard.outputs.should-implement == 'true'
        id: changes
        run: |
          CHANGED=$(git diff --name-only 2>/dev/null || echo "")
          UNTRACKED=$(git ls-files --others --exclude-standard 2>/dev/null || echo "")
          ALL_CHANGES=$(printf '%s\n%s' "$CHANGED" "$UNTRACKED" | sed '/^$/d' | sort -u)

          if [[ -z "$ALL_CHANGES" ]]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            echo "file-count=0" >> "$GITHUB_OUTPUT"
            echo "::notice::No files were modified by the agent."
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            COUNT=$(echo "$ALL_CHANGES" | wc -l | tr -d ' ')
            echo "file-count=${COUNT}" >> "$GITHUB_OUTPUT"
            {
              echo "files<<FILES_EOF"
              echo "$ALL_CHANGES"
              echo "FILES_EOF"
            } >> "$GITHUB_OUTPUT"
            echo "✔ ${COUNT} file(s) changed"
          fi

      # ================================================================
      # Step 13: Verify no protected files modified
      # ================================================================
      - name: Verify no protected files modified
        if: steps.changes.outputs.has-changes == 'true'
        run: |
          ALL_CHANGES=$(git diff --name-only 2>/dev/null; git ls-files --others --exclude-standard 2>/dev/null)

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              .github/workflows/*|harness.config.json|CLAUDE.md)
                git checkout -- "$file" 2>/dev/null || git rm --cached "$file" 2>/dev/null || true
                echo "::warning::Reverted protected file: ${file}"
                ;;
              frontend/package-lock.json|package-lock.json)
                git checkout -- "$file" 2>/dev/null || true
                echo "::warning::Reverted lock file: ${file}"
                ;;
            esac
          done <<< "$ALL_CHANGES"

      # ================================================================
      # Step 14: Quality gates (regression check)
      # ================================================================
      - name: Quality gates
        if: steps.changes.outputs.has-changes == 'true'
        id: gates
        run: |
          # Lint
          echo "no linter configured"
          echo "lint=true" >> "$GITHUB_OUTPUT"

          # Type check
          echo "no type checker configured"
          echo "type-check=true" >> "$GITHUB_OUTPUT"

          # Tests
          echo "no tests configured"
          echo "test=true" >> "$GITHUB_OUTPUT"

          # Build
          echo "no build configured"
          echo "build=true" >> "$GITHUB_OUTPUT"

      # ================================================================
      # Step 15: Create PR
      # ================================================================
      - name: Create PR
        if: steps.changes.outputs.has-changes == 'true' && steps.mode.outputs.mode == 'issue'
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.guard.outputs.branch }}
          ISSUE_NUMBER: ${{ steps.guard.outputs.issue-number }}
          ISSUE_TITLE: ${{ steps.guard.outputs.issue-title }}
          LINT: ${{ steps.gates.outputs.lint }}
          TYPE_CHECK: ${{ steps.gates.outputs.type-check }}
          TEST: ${{ steps.gates.outputs.test }}
          BUILD: ${{ steps.gates.outputs.build }}
          FILE_COUNT: ${{ steps.changes.outputs.file-count }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement #${ISSUE_NUMBER} — ${ISSUE_TITLE}" || true
          git push origin "${BRANCH}"

          LINT_STATUS=$([[ "$LINT" == "true" ]] && echo "PASS" || echo "FAIL")
          TYPE_STATUS=$([[ "$TYPE_CHECK" == "true" ]] && echo "PASS" || echo "FAIL")
          TEST_STATUS=$([[ "$TEST" == "true" ]] && echo "PASS" || echo "FAIL")
          BUILD_STATUS=$([[ "$BUILD" == "true" ]] && echo "PASS" || echo "FAIL")

          BODY=$(printf '<!-- issue-implementer: #%s -->\n\n## Summary\n\nAutomated implementation for #%s — %s\n\n## Quality Gates\n\n| Check | Status |\n|-------|--------|\n| Lint | %s |\n| Type Check | %s |\n| Tests | %s |\n| Build | %s |\n\n**Files changed**: %s\n\nCloses #%s' \
            "$ISSUE_NUMBER" "$ISSUE_NUMBER" "$ISSUE_TITLE" \
            "$LINT_STATUS" "$TYPE_STATUS" "$TEST_STATUS" "$BUILD_STATUS" \
            "$FILE_COUNT" "$ISSUE_NUMBER")

          echo "Creating PR for branch ${BRANCH}..."
          PR_URL=$(gh pr create \
            --title "feat: ${ISSUE_TITLE}" \
            --body "$BODY" \
            --label "agent-pr" \
            --head "${BRANCH}" \
            --base "${DEFAULT_BRANCH}")

          echo "pr-url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "PR created: ${PR_URL}"

      # ================================================================
      # Step 16: Push review-fix changes
      # ================================================================
      - name: Push review-fix changes
        if: steps.changes.outputs.has-changes == 'true' && steps.mode.outputs.mode == 'review-fix'
        env:
          BRANCH: ${{ steps.guard.outputs.branch }}
          PR_NUMBER: ${{ inputs.pr_number }}
          CYCLE: ${{ inputs.review_fix_cycle }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: review-fix cycle ${CYCLE} for PR #${PR_NUMBER}" || true
          git push origin "${BRANCH}"
          echo "✔ Pushed review-fix cycle ${CYCLE}"

      - name: Add review-fix cycle label
        if: steps.changes.outputs.has-changes == 'true' && steps.mode.outputs.mode == 'review-fix'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          CYCLE: ${{ inputs.review_fix_cycle }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const cycle = process.env.CYCLE;
            const label = `review-fix-cycle-${cycle}`;

            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: '5319E7',
                description: `Review-fix cycle ${cycle}`,
              });
            } catch {}

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: [label],
            });

      # ================================================================
      # Step 17: Post PR link on issue
      # ================================================================
      - name: Post PR link on issue
        if: steps.create-pr.outputs.pr-url
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          ISSUE_NUMBER: ${{ steps.guard.outputs.issue-number }}
          PR_URL: ${{ steps.create-pr.outputs.pr-url }}
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            const prUrl = process.env.PR_URL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                `## ✅ Implementation Agent — PR Created`,
                '',
                `**Pull Request**: ${prUrl}`,
                '',
                'The implementation agent has opened a pull request for this issue. It will go through the standard review cycle.',
                '',
                '---',
                '*🤖 [Issue Implementer](https://github.com/codefactory) — automated implementation.*',
              ].join('\n'),
            });

      # ================================================================
      # Step 18: Escalation (failure handler)
      # ================================================================
      - name: Escalate on failure
        if: failure() && steps.guard.outputs.should-implement == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          ISSUE_NUMBER: ${{ steps.guard.outputs.issue-number }}
          BRANCH: ${{ steps.guard.outputs.branch }}
          MODE: ${{ steps.mode.outputs.mode }}
          PR_NUMBER: ${{ inputs.pr_number || '' }}
        with:
          script: |
            const mode = process.env.MODE;
            const targetNumber = mode === 'review-fix'
              ? parseInt(process.env.PR_NUMBER, 10)
              : parseInt(process.env.ISSUE_NUMBER, 10);
            const branch = process.env.BRANCH;

            // Ensure label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'agent:needs-judgment',
                color: 'E4E669',
                description: 'Agent needs human judgment to proceed',
              });
            } catch {}

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: targetNumber,
              labels: ['agent:needs-judgment'],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: targetNumber,
              body: [
                '## ⚠️ Implementation Agent — Failed',
                '',
                `**Branch**: \`${branch}\``,
                `**Mode**: ${mode}`,
                `**Run**: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                'The implementation agent encountered an error. A human should review the logs and decide next steps.',
                '',
                '---',
                '*🤖 [Issue Implementer](https://github.com/codefactory) — automated implementation.*',
              ].join('\n'),
            });
