# SSSAI Security Scan — GitHub Actions Integration
#
# This workflow triggers a security scan on every deployment and blocks
# the pipeline if quality gates fail.
#
# Setup:
#   1. Create a webhook API key in SSSAI dashboard (Settings → Webhooks)
#   2. Add SSSAI_API_URL and SSSAI_API_KEY as GitHub repository secrets
#   3. Copy this file to .github/workflows/sssai-scan.yml in your repo

name: SSSAI Security Scan

on:
  # Run after your deploy workflow completes
  workflow_run:
    workflows: ["Deploy"]
    types:
      - completed
  # Or trigger directly on push to main/production branches
  push:
    branches:
      - main
      - production

jobs:
  security-scan:
    name: Security Scan & Quality Gate
    runs-on: ubuntu-latest
    # Only run on successful deploys (if using workflow_run trigger)
    # if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger SSSAI security scan
        id: trigger
        env:
          SSSAI_API_URL: ${{ secrets.SSSAI_API_URL }}
          SSSAI_API_KEY: ${{ secrets.SSSAI_API_KEY }}
          TARGET_URL: ${{ vars.SSSAI_TARGET_URL }}   # e.g. https://yourapp.com
        run: |
          RESPONSE=$(curl -s -X POST "${SSSAI_API_URL}/api/webhooks/scan" \
            -H "X-API-Key: ${SSSAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "target": "'"${TARGET_URL}"'",
              "commit_sha": "'"${{ github.sha }}"'",
              "branch": "'"${{ github.ref_name }}"'",
              "environment": "production",
              "deployer": "github-actions",
              "scan_type": "security",
              "gates": {
                "max_critical": 0,
                "max_high": 3,
                "max_risk_score": 60
              }
            }')

          echo "Trigger response: $RESPONSE"
          SCAN_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['scan_id'])")
          echo "scan_id=$SCAN_ID" >> "$GITHUB_OUTPUT"
          echo "Scan triggered: $SCAN_ID"

      - name: Wait for scan result
        id: result
        env:
          SSSAI_API_URL: ${{ secrets.SSSAI_API_URL }}
          SSSAI_API_KEY: ${{ secrets.SSSAI_API_KEY }}
        run: |
          SCAN_ID="${{ steps.trigger.outputs.scan_id }}"
          MAX_WAIT=600   # 10 minutes
          POLL_INTERVAL=15
          ELAPSED=0

          echo "Polling for scan result (scan_id=$SCAN_ID)..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESPONSE=$(curl -s "${SSSAI_API_URL}/api/webhooks/scan/${SCAN_ID}/result" \
              -H "X-API-Key: ${SSSAI_API_KEY}")

            STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            GATE_PASSED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('gate_passed','')).lower())")

            echo "[$ELAPSED s] Status: $STATUS | Gate passed: $GATE_PASSED"

            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              echo "gate_passed=$GATE_PASSED" >> "$GITHUB_OUTPUT"
              echo "scan_response=$RESPONSE" >> "$GITHUB_OUTPUT"
              break
            fi

            sleep $POLL_INTERVAL
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "Scan timed out after ${MAX_WAIT}s"
            echo "gate_passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Print scan summary
        run: |
          echo "=== SSSAI Scan Summary ==="
          echo '${{ steps.result.outputs.scan_response }}' | python3 -m json.tool || true

      - name: Enforce quality gate
        env:
          GATE_PASSED: ${{ steps.result.outputs.gate_passed }}
        run: |
          if [ "$GATE_PASSED" != "true" ]; then
            echo "❌ Security quality gate FAILED. Review scan results and fix critical/high findings."
            exit 1
          fi
          echo "✅ Security quality gate PASSED."

      - name: Post PR comment (optional)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const scanResponse = JSON.parse(`${{ steps.result.outputs.scan_response }}` || '{}');
            const gatePassed = scanResponse.gate_passed;
            const riskScore = scanResponse.risk_score ?? 'N/A';
            const findingsCount = scanResponse.findings_count ?? 'N/A';
            const scanId = '${{ steps.trigger.outputs.scan_id }}';

            const statusEmoji = gatePassed ? '✅' : '❌';
            const statusText = gatePassed ? 'PASSED' : 'FAILED';

            const body = `## ${statusEmoji} SSSAI Security Scan — Gate ${statusText}

            | Metric | Value |
            |--------|-------|
            | Risk Score | ${riskScore} |
            | Findings | ${findingsCount} |
            | Gate | ${statusText} |
            | Scan ID | \`${scanId}\` |

            ${gatePassed ? 'No blocking security issues found.' : '⚠️ Security issues found that exceed quality gate thresholds.'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
