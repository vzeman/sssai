# NemoClaw agent configuration for the security scanner.
# NemoClaw = OpenClaw + OpenShell + Nemotron/Claude inference
# See: https://github.com/NVIDIA/NemoClaw

apiVersion: nemoclaw.nvidia.com/v1alpha1
kind: AgentConfig
metadata:
  name: security-scanner-agent
spec:
  sandbox:
    policy: security-scanner
    timeout: 3600s
  inference:
    # Use "anthropic" for Claude or "nemotron" for NVIDIA Nemotron
    provider: anthropic
    model: claude-sonnet-4-20250514
    # model: nemotron-3-super-120b  # Alternative: use Nemotron for local inference
  agent:
    maxToolCalls: 200
    maxRetries: 3
    # Enable OpenClaw skill learning for agents to build reusable scan patterns
    skillLearning: false
  credentials:
    # Injected via OpenShell env vars — never stored in filesystem
    envVars:
      - ANTHROPIC_API_KEY
